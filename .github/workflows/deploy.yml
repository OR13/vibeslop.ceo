name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow only one concurrent deployment; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # Use `npm install`, not `npm ci`: native deps (Tailwind oxide,
      # lightningcss) pull platform-specific @emnapi optional-of-optional deps
      # that a macOS-generated lockfile can't enumerate for Linux, which makes
      # strict `npm ci` fail on the runner. `npm install` resolves them fresh.
      - run: npm install --no-audit --no-fund
      # `next build` with output:export validates every YAML file (a layoff
      # entry with no source fails here) and emits the static site to ./out.
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
