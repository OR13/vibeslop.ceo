# Template for an Exit Club entry. Files starting with "_" are ignored by the
# build — copy this to e.g. `acme.yaml` and fill it in.
#
# This board is companies whose PRODUCT IS BUILT MOSTLY WITH AI — vibe-coding,
# AI app builders, AI coding tools — that were ACQUIRED. No solo-founder
# requirement: teams, co-founders and outside funding are all fine. The file's
# presence in data/exits/ is the claim; only add records that fit.
#
# Scoped to calendar years 2025 and 2026 (by `date`); entries dated outside
# that window won't appear.

name: Jane Builder              # person/founder credited
company: Acme                   # what was acquired
exit_amount_usd: 3000000        # OPTIONAL integer USD; omit if undisclosed
acquirer: BigCo                 # optional
date: 2026-09-01                # YYYY-MM-DD (must be 2025 or 2026 to show)
blurb: One sentence — what the product is, that it's AI-built, and the deal.
ai_tools:                       # optional
  - AI coding agents
links:                          # all optional
  x: https://x.com/janebuilder
sources:                        # optional but encouraged: labeled URLs
  - label: TechCrunch
    url: https://techcrunch.com/...
